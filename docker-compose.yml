services:
  postgres:
    image: postgres:16-alpine
    container_name: jianzhai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jianzhai
      POSTGRES_USER: jianzhai
      POSTGRES_PASSWORD: jianzhai
    ports:
      - "5432:5432"
    volumes:
      - jianzhai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jianzhai -d jianzhai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jianzhai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - jianzhai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  jianzhai_pg_data:
  jianzhai_redis_data:
