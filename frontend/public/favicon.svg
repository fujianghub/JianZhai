<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <title>简斋 / JianZhai</title>
  <defs>
  <!-- 翡翠渐变：对齐 AdminLayout .jz-admin-brand-seal -->
    <linearGradient id="seal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#06d6a0"/>
    </linearGradient>
    <!-- 顶部高光：玻璃面反光 -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- 外发光：深色标签栏下提升对比 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#059669" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- 翡翠方印底 + 外发光 -->
  <g filter="url(#glow)">
    <rect x="5" y="5" width="54" height="54" rx="14" fill="url(#seal)"/>
    <!-- 细白描边：深浅标签栏均清晰 -->
    <rect x="5.5" y="5.5" width="53" height="53" rx="13.5" fill="none"
          stroke="#ffffff" stroke-width="1" opacity="0.22"/>
    <!-- 内描边：玻璃 inset -->
    <rect x="8" y="8" width="48" height="48" rx="11" fill="none"
          stroke="#ffffff" stroke-width="0.6" opacity="0.14"/>
  </g>

  <!-- 顶部高光 -->
  <rect x="5" y="5" width="54" height="24" rx="14" fill="url(#highlight)"/>

  <!-- "簡" 字：深绿印面色，对齐 admin seal 字色 -->
  <text x="32" y="44.5" text-anchor="middle"
        font-family="'PingFang SC', 'Noto Serif SC', 'Songti SC', 'STSong', serif"
        font-size="36" font-weight="800"
        fill="#0a1f1a">簡</text>
</svg>
