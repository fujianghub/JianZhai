name: tests

# Runs on every push to main and every PR. Keep it minimal: just the two test
# suites + a TypeScript type-check. Lint / build / coverage can land in
# separate workflows later if/when they become worth the CI minutes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend pytest
    runs-on: ubuntu-latest

    # Django tests need real Postgres (tsvector + GinIndex) and Redis
    # (django-redis + celery broker). Versions match local dev — Postgres 14
    # is the lower bound documented in CLAUDE.md, Redis 7 is just current.
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: jianzhai
          POSTGRES_PASSWORD: jianzhai
          POSTGRES_DB: jianzhai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jianzhai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # settings.py refuses to boot with the dev SECRET_KEY when DEBUG=False
    # (added in this branch to catch unsafe deploys). DEBUG=True here keeps
    # that guard off so tests can use the placeholder key.
    env:
      DATABASE_URL: postgresql://jianzhai:jianzhai@localhost:5432/jianzhai
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-test-secret-not-used-anywhere-real
      DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: backend
        run: pytest -v

  frontend:
    name: frontend vitest + tsc
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # pnpm setup must come BEFORE setup-node so the node action can pick
      # pnpm up for caching purposes.
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: pnpm tsc --noEmit

      - name: Run vitest
        working-directory: frontend
        run: pnpm vitest run
